<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NP · V5 · Story 1080×1920</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;overflow:hidden;background:#000}
.ad{width:1080px;height:1920px;position:relative;font-family:'Montserrat',sans-serif;overflow:hidden}

/* ════════════════════════════════════
   Nova imagem do cliente — Fiat antes/depois
   A fita verde no capô já cria a divisão visual
   Não precisa mais do CSS grayscale
   ════════════════════════════════════ */
.photo{
  position:absolute;inset:0;
  background:url('images/photo_fiat.jpg') center 25% / cover no-repeat;
}

/* Escurece levemente a metade esquerda (antes) */
.before-veil{
  position:absolute;top:0;left:0;bottom:0;width:50%;
  background:linear-gradient(to right,rgba(0,0,0,.35) 0%,transparent 100%);
  z-index:3;
}

/* Linha divisória dourada — reforça a fita verde */
.divider{
  position:absolute;top:0;bottom:0;left:50%;
  width:3px;
  background:linear-gradient(to bottom,transparent,#C9A84C 8%,#E8C96A 50%,#C9A84C 92%,transparent);
  transform:translateX(-50%);z-index:10;
  box-shadow:0 0 24px rgba(201,168,76,.6);
}
.divider-dot{
  position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);
  width:28px;height:28px;border-radius:50%;
  background:radial-gradient(circle,#E8C96A,#C9A84C);
  box-shadow:0 0 40px rgba(201,168,76,.9);z-index:11;
}

/* Labels ANTES / DEPOIS — no terço superior da foto */
.comp-labels{
  position:absolute;top:400px;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:0 80px;
  z-index:15;
}
.label{
  display:inline-block;
  font-size:15px;font-weight:800;letter-spacing:5px;text-transform:uppercase;
  padding:10px 28px;border-radius:24px;
  text-shadow:0 1px 8px rgba(0,0,0,.9);
}
.label-before{
  color:rgba(255,255,255,.5);
  border:1px solid rgba(255,255,255,.2);
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(6px);
}
.label-after{
  color:#C9A84C;
  border:1px solid rgba(201,168,76,.5);
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(6px);
}

/* Gradiente topo */
.ov-top{
  position:absolute;top:0;left:0;right:0;height:520px;
  background:linear-gradient(to bottom,rgba(0,0,0,.88) 0%,rgba(0,0,0,.5) 48%,rgba(0,0,0,.08) 80%,transparent 100%);
  z-index:12;
}

/* Gradiente fundo */
.ov-bottom{
  position:absolute;bottom:0;left:0;right:0;height:1040px;
  background:linear-gradient(to top,rgba(0,0,0,.99) 0%,rgba(2,1,0,.96) 38%,rgba(5,4,0,.82) 60%,rgba(8,6,0,.44) 80%,transparent 100%);
  z-index:12;
}

/* ════════════════════════════════════
   TOP BAR — FORA DA SAFE ZONE (y=45px)
   ════════════════════════════════════ */
.top-bar{
  position:absolute;top:45px;left:80px;right:80px;
  z-index:25;
  display:flex;justify-content:space-between;align-items:center;
}
.logo-img{
  height:54px;width:auto;
  filter:drop-shadow(0 2px 12px rgba(0,0,0,.9));
}
.rating{text-align:right}
.rating-stars{color:#C9A84C;font-size:22px;letter-spacing:3px;text-shadow:0 1px 8px rgba(0,0,0,.9)}
.rating-num{font-size:18px;font-weight:700;color:#C9A84C;margin-top:2px;text-shadow:0 1px 8px rgba(0,0,0,.9)}

/* ════════════════════════════════════
   CONTEÚDO PRINCIPAL
   ════════════════════════════════════ */
.bottom{
  position:absolute;bottom:0;left:0;right:0;
  padding:0 80px 100px;
  z-index:20;
}

.accent-line{
  width:64px;height:4px;
  background:linear-gradient(90deg,#C9A84C,#E8C96A);
  margin-bottom:26px;border-radius:2px;
}

h1{
  font-size:90px;font-weight:900;
  line-height:1.06;letter-spacing:-2.5px;
  margin-bottom:22px;
}

/* ✅ "Isso não é photoshop." em roxo NP — conforme solicitado */
h1 .purple{
  color:#5636d1;
  text-shadow:0 3px 60px rgba(0,0,0,1),0 0 40px rgba(86,54,209,.4),0 1px 12px rgba(0,0,0,1);
}

/* "É vitrificação." em branco */
h1 .white{
  color:#ffffff;
  text-shadow:0 3px 60px rgba(0,0,0,1),0 1px 12px rgba(0,0,0,1);
}

.sub{
  font-size:24px;font-weight:400;
  color:rgba(255,255,255,.72);line-height:1.55;
  margin-bottom:42px;
  text-shadow:0 2px 24px rgba(0,0,0,1);
}

.cta{
  display:flex;align-items:center;justify-content:center;gap:14px;
  background:#25D366;color:#fff;
  font-family:'Montserrat',sans-serif;font-size:26px;font-weight:700;
  padding:26px;border-radius:60px;text-decoration:none;
  box-shadow:0 10px 40px rgba(37,211,102,.4);
}
</style>
</head>
<body>
<div class="ad">
  <div class="photo"></div>
  <div class="before-veil"></div>
  <div class="divider"><div class="divider-dot"></div></div>
  <div class="ov-top"></div>
  <div class="ov-bottom"></div>

  <!-- Logo real NP + avaliação — fora da safe zone OK -->
  <div class="top-bar">
    <img src="images/logo-np.webp" alt="NP Car Detail" class="logo-img">
    <div class="rating">
      <div class="rating-stars">★★★★★</div>
      <div class="rating-num">4.9</div>
    </div>
  </div>

  <!-- Labels Antes/Depois — distribuem o conteúdo verticalmente -->
  <div class="comp-labels">
    <span class="label label-before">ANTES</span>
    <span class="label label-after">DEPOIS</span>
  </div>

  <!-- Conteúdo principal -->
  <div class="bottom">
    <div class="accent-line"></div>
    <h1>
      <span class="purple">Isso não é<br>photoshop.</span><br>
      <span class="white">É vitrificação.</span>
    </h1>
    <p class="sub">Uma sessão na NP e seu carro sai<br>com brilho de showroom. Resultado real.</p>
    <a class="cta" href="https://wa.me/5548991706555?text=Oi%2C%20quero%20saber%20sobre%20vitrifica%C3%A7%C3%A3o">💬 Agendar minha vitrificação</a>
  </div>
</div>
<script>
(function(){
  var W=1080,H=1920;
  var s=Math.min(window.innerWidth/W,window.innerHeight/H)*0.95;
  if(s<1){
    document.body.style.transformOrigin="top center";
    document.body.style.transform="scale("+s+")";
    var d=document.documentElement;
    d.style.height=(H*s)+"px";
    d.style.background="#111";
    d.style.display="flex";
    d.style.justifyContent="center";
    d.style.overflow="hidden";
  }
})();
</script>
</body>
</html>
