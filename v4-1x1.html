<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NP · V4 · Feed 1080×1080</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden;background:#000}
.ad{width:1080px;height:1080px;position:relative;font-family:'Montserrat',sans-serif;overflow:hidden}

.photo{
  position:absolute;inset:0;
  background:url('images/photo1.jpg') center 40% / cover no-repeat;
}
.ov-top{
  position:absolute;top:0;left:0;right:0;height:280px;
  background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);
}
.ov-bottom{
  position:absolute;bottom:0;left:0;right:0;height:460px;
  background:linear-gradient(to top,rgba(0,0,0,.97) 0%,rgba(0,0,0,.82) 45%,rgba(0,0,0,.35) 75%,transparent 100%);
}
.ov-sides{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 88% 88% at 50% 50%,transparent 48%,rgba(0,0,0,.35) 100%);
}

/* Badge de rating centralizado */
.badge-wrap{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-68%);
  z-index:20;display:flex;flex-direction:column;align-items:center;gap:0;
}
.badge{
  background:rgba(0,0,0,.5);
  border:1px solid rgba(201,168,76,.35);
  border-radius:20px;
  padding:24px 48px;
  backdrop-filter:blur(12px);
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.badge-stars{color:#C9A84C;font-size:42px;letter-spacing:6px}
.badge-num{
  font-size:80px;font-weight:900;line-height:1;
  color:transparent;
  background:linear-gradient(90deg,#C9A84C,#E8C96A,#C9A84C);
  -webkit-background-clip:text;background-clip:text;
}
.badge-label{font-size:14px;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:3px;text-transform:uppercase}

.top-bar{
  position:absolute;top:0;left:0;right:0;padding:36px 52px;z-index:20;
  display:flex;justify-content:space-between;align-items:flex-start;
}
.logo-np{font-size:22px;font-weight:900;color:#C9A84C;letter-spacing:5px}
.logo-sub{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);letter-spacing:4px;margin-top:3px}

.bottom{position:absolute;bottom:0;left:0;right:0;padding:0 52px 46px;z-index:20}
.accent-line{width:60px;height:3px;background:linear-gradient(90deg,#C9A84C,#E8C96A);margin-bottom:18px;border-radius:2px}
h1{font-size:48px;font-weight:900;color:#fff;line-height:1.1;letter-spacing:-1.5px;margin-bottom:12px}
h1 em{font-style:normal;color:#C9A84C;text-shadow:0 2px 28px rgba(0,0,0,1),0 1px 8px rgba(0,0,0,1);}
.sub{font-size:16px;color:rgba(255,255,255,.6);line-height:1.5;margin-bottom:24px}
.cta{
  display:inline-flex;align-items:center;gap:10px;
  background:#25D366;color:#fff;
  font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;
  padding:16px 36px;border-radius:50px;text-decoration:none;
  box-shadow:0 6px 28px rgba(37,211,102,.4);
}
.logo-img{height:36px;width:auto;filter:drop-shadow(0 2px 8px rgba(0,0,0,.9));}
</style>
<style id="np-polish">
h1,h2{text-shadow:0 2px 28px rgba(0,0,0,1),0 1px 8px rgba(0,0,0,1)!important}
h1 em,h1 span.bright,h1 span.muted{text-shadow:inherit!important}
.sub{text-shadow:0 1px 12px rgba(0,0,0,1)!important}
.top-bar *{text-shadow:0 1px 10px rgba(0,0,0,1)!important}
.eyebrow{background:rgba(0,0,0,.55)!important;padding:5px 16px!important;border-radius:20px!important;display:inline-block!important;backdrop-filter:blur(6px)!important;-webkit-backdrop-filter:blur(6px)!important}
.bul-text,.feat-text{text-shadow:0 1px 8px rgba(0,0,0,.9)!important}
.bul-icon{text-shadow:0 1px 8px rgba(0,0,0,.9)!important}
.rating-stars,.rating-num,.rating-label{text-shadow:0 1px 8px rgba(0,0,0,.9)!important}
.r-sub,.r-val,.stars{text-shadow:0 1px 8px rgba(0,0,0,.9)!important}
.logo-np,.logo-sub{text-shadow:0 2px 12px rgba(0,0,0,1)!important}
.badge-label{text-shadow:0 1px 6px rgba(0,0,0,.8)!important}
.hero-tag{text-shadow:0 1px 10px rgba(0,0,0,.95)!important}
.water-badge{text-shadow:0 1px 6px rgba(0,0,0,.7)!important}
</style>
</head>
<body>
<div class="ad">
  <div class="photo"></div>
  <div class="ov-top"></div>
  <div class="ov-bottom"></div>
  <div class="ov-sides"></div>

  <div class="top-bar">
    <img src="images/logo-np.webp" alt="NP Car Detail" class="logo-img">
  </div>

  <div class="badge-wrap">
    <div class="badge">
      <div class="badge-stars">★★★★★</div>
      <div class="badge-num">4.9</div>
      <div class="badge-label">100+ avaliações Google</div>
    </div>
  </div>

  <div class="bottom">
    <div class="accent-line"></div>
    <h1><em>4.9 estrelas.</em><br>Mais de 100 carros<br>protegidos na NP.</h1>
    <p class="sub">A vitrificação que os clientes aprovam e recomendam. Resultado real, sem filtro.</p>
    <a class="cta" href="https://wa.me/5548991706555?text=Oi%2C%20quero%20saber%20sobre%20vitrifica%C3%A7%C3%A3o">💬 Quero meu carro protegido</a>
  </div>
</div>
<script>
(function(){
  var W=document.body.offsetWidth||1080,H=document.body.offsetHeight||1080;
  var s=Math.min(window.innerWidth/W,window.innerHeight/H)*0.95;
  if(s<1){
    document.body.style.transformOrigin="top center";
    document.body.style.transform="scale("+s+")";
    var d=document.documentElement;
    d.style.height=(H*s)+"px";
    d.style.background="#111";
    d.style.display="flex";
    d.style.justifyContent="center";
    d.style.overflow="hidden";
  }
})();
</script>
</body>
</html>
