<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>NP · V3 · Feed 1080×1080</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden;background:#000}
.ad{width:1080px;height:1080px;position:relative;font-family:'Montserrat',sans-serif;overflow:hidden}

.photo{
  position:absolute;inset:0;
  background:url('images/photo_water.jpg') center 52% / cover no-repeat;
}
/* Tint azul água sutil */
.ov-blue{
  position:absolute;inset:0;
  background:linear-gradient(200deg,rgba(10,40,80,.45) 0%,rgba(5,20,50,.2) 50%,transparent 75%);
}
.ov-top{
  position:absolute;top:0;left:0;right:0;height:280px;
  background:linear-gradient(to bottom,rgba(0,0,0,.78),transparent);
}
.ov-bottom{
  position:absolute;bottom:0;left:0;right:0;height:500px;
  background:linear-gradient(to top,rgba(0,0,5,.97) 0%,rgba(0,5,15,.88) 45%,rgba(0,10,25,.4) 75%,transparent 100%);
}
.ov-sides{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 88% 88% at 50% 50%,transparent 50%,rgba(0,0,0,.35) 100%);
}

.top-bar{
  position:absolute;top:0;left:0;right:0;padding:36px 52px;z-index:20;
  display:flex;justify-content:space-between;align-items:flex-start;
}
.logo-np{font-size:22px;font-weight:900;color:#C9A84C;letter-spacing:5px}
.logo-sub{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);letter-spacing:4px;margin-top:3px}
.rating{text-align:right}
.rating-stars{color:#C9A84C;font-size:16px;letter-spacing:3px}
.rating-num{font-size:13px;font-weight:700;color:#C9A84C;margin-top:2px}
.rating-label{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}

/* Water badge */
.water-badge{
  position:absolute;top:36px;left:50%;transform:translateX(-50%);z-index:20;
  background:rgba(10,40,100,.4);
  border:1px solid rgba(79,195,247,.35);
  border-radius:30px;padding:8px 22px;
  backdrop-filter:blur(8px);
  font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase;
  color:rgba(79,195,247,.9);
  white-space:nowrap;
}

.bottom{position:absolute;bottom:0;left:0;right:0;padding:0 52px 48px;z-index:20}
.accent-line{width:60px;height:3px;background:linear-gradient(90deg,#4FC3F7,#81D4FA);margin-bottom:18px;border-radius:2px}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:rgba(79,195,247,.75);margin-bottom:12px}
h1{font-size:52px;font-weight:900;color:#fff;line-height:1.1;letter-spacing:-1.5px;margin-bottom:14px}
h1 em{font-style:normal;color:#4FC3F7;text-shadow:0 2px 28px rgba(0,0,0,1),0 1px 8px rgba(0,0,0,1);}
.sub{font-size:17px;color:rgba(255,255,255,.62);line-height:1.5;margin-bottom:26px}
.features{display:flex;gap:0;margin-bottom:28px;flex-direction:column;gap:10px}
.feat{display:flex;align-items:center;gap:12px}
.feat-dot{width:7px;height:7px;border-radius:50%;background:#4FC3F7;flex-shrink:0}
.feat-text{font-size:15px;font-weight:600;color:rgba(255,255,255,.75)}
.cta{
  display:inline-flex;align-items:center;gap:10px;
  background:#25D366;color:#fff;
  font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;
  padding:16px 36px;border-radius:50px;text-decoration:none;
  box-shadow:0 6px 28px rgba(37,211,102,.4);
}
.logo-img{height:36px;width:auto;filter:drop-shadow(0 2px 8px rgba(0,0,0,.9));}
</style>
<style id="np-polish">
h1,h2{text-shadow:0 2px 28px rgba(0,0,0,1),0 1px 8px rgba(0,0,0,1)!important}
h1 em,h1 span.bright,h1 span.muted{text-shadow:inherit!important}
.sub{text-shadow:0 1px 12px rgba(0,0,0,1)!important}
.top-bar *{text-shadow:0 1px 10px rgba(0,0,0,1)!important}
.eyebrow{background:rgba(0,0,0,.55)!important;padding:5px 16px!important;border-radius:20px!important;display:inline-block!important;backdrop-filter:blur(6px)!important;-webkit-backdrop-filter:blur(6px)!important}
.bul-text,.feat-text{text-shadow:0 1px 8px rgba(0,0,0,.9)!important}
.bul-icon{text-shadow:0 1px 8px rgba(0,0,0,.9)!important}
.rating-stars,.rating-num,.rating-label{text-shadow:0 1px 8px rgba(0,0,0,.9)!important}
.r-sub,.r-val,.stars{text-shadow:0 1px 8px rgba(0,0,0,.9)!important}
.logo-np,.logo-sub{text-shadow:0 2px 12px rgba(0,0,0,1)!important}
.badge-label{text-shadow:0 1px 6px rgba(0,0,0,.8)!important}
.hero-tag{text-shadow:0 1px 10px rgba(0,0,0,.95)!important}
.water-badge{text-shadow:0 1px 6px rgba(0,0,0,.7)!important}
</style>
</head>
<body>
<div class="ad">
  <div class="photo"></div>
  <div class="ov-blue"></div>
  <div class="ov-top"></div>
  <div class="ov-bottom"></div>
  <div class="ov-sides"></div>

  <div class="top-bar">
    <img src="images/logo-np.webp" alt="NP Car Detail" class="logo-img">
    <div class="rating">
      <div class="rating-stars">★★★★★</div>
      <div class="rating-num">4.9</div>
      <div class="rating-label">100+ no Google</div>
    </div>
  </div>

  <div class="water-badge">💧 Repelência Total</div>

  <div class="bottom">
    <div class="eyebrow">Proteção Cerâmica · Palhoça SC</div>
    <div class="accent-line"></div>
    <h1>Depois da vitrificação:<br><em>sujeira não gruda.</em></h1>
    <p class="sub">Uma aplicação. Anos de proteção. Sem encerar, sem polir.</p>
    <div class="features">
      <div class="feat"><div class="feat-dot"></div><span class="feat-text">Repele água, lama e sujeira</span></div>
      <div class="feat"><div class="feat-dot"></div><span class="feat-text">Protege contra UV e oxidação</span></div>
      <div class="feat"><div class="feat-dot"></div><span class="feat-text">Brilho profundo de longa duração</span></div>
    </div>
    <a class="cta" href="https://wa.me/5548991706555?text=Oi%2C%20quero%20saber%20sobre%20vitrifica%C3%A7%C3%A3o">💬 Pedir orçamento agora</a>
  </div>
</div>
<script>
(function(){
  var W=document.body.offsetWidth||1080,H=document.body.offsetHeight||1080;
  var s=Math.min(window.innerWidth/W,window.innerHeight/H)*0.95;
  if(s<1){
    document.body.style.transformOrigin="top center";
    document.body.style.transform="scale("+s+")";
    var d=document.documentElement;
    d.style.height=(H*s)+"px";
    d.style.background="#111";
    d.style.display="flex";
    d.style.justifyContent="center";
    d.style.overflow="hidden";
  }
})();
</script>
</body>
</html>
